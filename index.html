<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Решение задач по ТВиМС</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f4f7f6;
        }
        h1, h2 {
            color: #2c3e50;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }
        .task {
            margin-bottom: 50px;
        }
        .input-group {
            margin-bottom: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        .input-group label {
            font-weight: bold;
            min-width: 150px;
        }
        input {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            width: 80px;
        }
        .results {
            background: #e8f4f8;
            padding: 15px;
            border-radius: 4px;
            margin-top: 20px;
        }
        canvas {
            margin-top: 20px;
            max-width: 100%;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }
        .formula {
            font-style: italic;
            color: #555;
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <section class="task" id="task1">
        <h2>Задание 1: Группированные данные</h2>
        <p>Введите частоты для интервалов:</p>
        <table>
            <thead>
                <tr>
                    <th>Интервал</th>
                    <th>Частота (ni)</th>
                </tr>
            </thead>
            <tbody id="freq-table-body">
                <tr><td>(-4, 0]</td><td><input type="number" value="4" class="task1-ni" data-start="-4" data-end="0"></td></tr>
                <tr><td>(0, 4]</td><td><input type="number" value="13" class="task1-ni" data-start="0" data-end="4"></td></tr>
                <tr><td>(4, 8]</td><td><input type="number" value="25" class="task1-ni" data-start="4" data-end="8"></td></tr>
                <tr><td>(8, 12]</td><td><input type="number" value="14" class="task1-ni" data-start="8" data-end="12"></td></tr>
                <tr><td>(12, 16]</td><td><input type="number" value="4" class="task1-ni" data-start="12" data-end="16"></td></tr>
            </tbody>
        </table>

        <div class="results" id="task1-results">
            <!-- Results will be injected here -->
        </div>

        <canvas id="histogramChart"></canvas>
        <canvas id="edfChart"></canvas>
    </section>

    <section class="task" id="task2">
        <h2>Задание 2: Доверительные интервалы (Нормальное распределение)</h2>
        <div class="input-group">
            <label>Среднее выборки (x̄):</label>
            <input type="number" id="t2-xbar" value="-20" step="0.1">
        </div>
        <div class="input-group">
            <label>Объем выборки (n):</label>
            <input type="number" id="t2-n" value="40">
        </div>
        <div class="input-group">
            <label>СКО (σ):</label>
            <input type="number" id="t2-sigma" value="3.1" step="0.001">
            <span>(Задано как 0,1*31 = 3.1)</span>
        </div>

        <div class="results" id="task2-results">
            <!-- Results will be injected here -->
        </div>

        <canvas id="ciChart"></canvas>
    </section>

    <script>
        function getZScore(gamma) {
            const alpha = 1 - gamma;
            const p = 1 - alpha / 2;
            const a = [-39.69683028665376, 220.9460984245205, -275.9285104469687, 138.3577518672690, -30.66479806614716, 2.506628277459239];
            const b = [-54.47609879822406, 161.5858368580409, -155.6989798598866, 66.80131188771972, -13.280681552885721];
            const c = [-0.007784894002430293, -0.3223964580411365, -2.400758277161838, -2.549732539343734, 4.374664141464968, 2.938163982698783];
            const d = [0.007784695709041462, 0.3224671290700398, 2.445134137142996, 3.754408661907416];
            const q = p - 0.5;
            if (Math.abs(q) < 0.42) {
                const r = q * q;
                return q * (((a[0] * r + a[1]) * r + a[2]) * r + a[3]) * r + a[4] / ((((b[0] * r + b[1]) * r + b[2]) * r + b[3]) * r + b[4] * r + 1);
            } else {
                let r = p;
                if (q > 0) r = 1 - p;
                r = Math.sqrt(-Math.log(r));
                let res;
                if (r <= 5) {
                    r = r - 1.570796;
                    res = (((c[0] * r + c[1]) * r + c[2]) * r + c[3]) * r + c[4] / (((d[0] * r + d[1]) * r + d[2]) * r + d[3] * r + 1);
                } else {
                    r = r - 5.0;
                    res = (((c[0] * r + c[1]) * r + c[2]) * r + c[3]) * r + c[4] / (((d[0] * r + d[1]) * r + d[2]) * r + d[3] * r + 1);
                }
                return q < 0 ? -res : res;
            }
        }

        function getTScore(gamma, df) {
            if (df > 100) return getZScore(gamma);

            if (gamma === 0.95) {
                if (df >= 60) return 2.000;
                if (df >= 40) return 2.021;
                if (df >= 30) return 2.042;
                return 2.0;
            }
            return getZScore(gamma);
        }

        // Standard normal CDF (Laplace function approximation)
        function normalCDF(x) {
            const t = 1 / (1 + 0.2316419 * Math.abs(x));
            const d = 0.3989423 * Math.exp(-x * x / 2);
            const p = d * t * (0.3193815 + t * (-0.3565638 + t * (1.781478 + t * (-1.821256 + t * 1.330274))));
            return x > 0 ? 1 - p : p;
        }

        // Chi-squared critical values for alpha = 0.05
        function getChiSqCrit(df) {
            const table = {
                1: 3.841, 2: 5.991, 3: 7.815, 4: 9.488, 5: 11.070,
                6: 12.592, 7: 14.067, 8: 15.507, 9: 16.919, 10: 18.307
            };
            return table[df] || (df > 10 ? df + 1.645 * Math.sqrt(2 * df) : 3.841);
        }

        let histogramChart, edfChart, ciChart;

        function updateTask1() {
            const inputs = document.querySelectorAll('.task1-ni');
            const intervals = [];
            let totalN = 0;

            inputs.forEach(input => {
                const start = parseFloat(input.dataset.start);
                const end = parseFloat(input.dataset.end);
                const ni = parseFloat(input.value) || 0;
                const mid = (start + end) / 2;
                intervals.push({ start, end, ni, mid });
                totalN += ni;
            });

            if (totalN === 0) return;

            let sumXiNi = 0;
            intervals.forEach(int => sumXiNi += int.mid * int.ni);
            const xBar = sumXiNi / totalN;

            let sumXiMinusXBarSqNi = 0;
            intervals.forEach(int => sumXiMinusXBarSqNi += Math.pow(int.mid - xBar, 2) * int.ni);
            const sampleVar = sumXiMinusXBarSqNi / totalN;
            const unbiasedVar = sumXiMinusXBarSqNi / (totalN - 1);
            const s = Math.sqrt(unbiasedVar);

            // Mode, Median ...
            let maxNi = -1;
            let modalIdx = 0;
            intervals.forEach((int, i) => {
                if (int.ni > maxNi) {
                    maxNi = int.ni;
                    modalIdx = i;
                }
            });
            const h = intervals[0].end - intervals[0].start;
            const nMo = intervals[modalIdx].ni;
            const nMoPrev = modalIdx > 0 ? intervals[modalIdx - 1].ni : 0;
            const nMoNext = modalIdx < intervals.length - 1 ? intervals[modalIdx + 1].ni : 0;
            const Mo = intervals[modalIdx].start + h * (nMo - nMoPrev) / ((nMo - nMoPrev) + (nMo - nMoNext));

            let cumulativeN = 0;
            let medianIdx = 0;
            for (let i = 0; i < intervals.length; i++) {
                cumulativeN += intervals[i].ni;
                if (cumulativeN >= totalN / 2) {
                    medianIdx = i;
                    break;
                }
            }
            const sumNiPrev = medianIdx > 0 ? intervals.slice(0, medianIdx).reduce((acc, curr) => acc + curr.ni, 0) : 0;
            const Me = intervals[medianIdx].start + h * (totalN / 2 - sumNiPrev) / intervals[medianIdx].ni;

            const tScore = 2.000;
            const delta = tScore * s / Math.sqrt(totalN);
            const ciLow = xBar - delta;
            const ciHigh = xBar + delta;

            // --- Pearson's Chi-Squared Test ---
            let chiObs = 0;
            const theoreticalNi = [];
            intervals.forEach((int, i) => {
                // Adjust boundaries for first and last interval to cover (-inf, inf)
                const a = (i === 0) ? -Infinity : int.start;
                const b = (i === intervals.length - 1) ? Infinity : int.end;
                
                const p = normalCDF((b - xBar) / s) - normalCDF((a - xBar) / s);
                const nPrime = totalN * p;
                theoreticalNi.push(nPrime);
                if (nPrime > 0) {
                    chiObs += Math.pow(int.ni - nPrime, 2) / nPrime;
                }
            });

            const df = intervals.length - 2 - 1; // k - m - 1, where m=2 (mean and variance)
            const chiCrit = getChiSqCrit(df);
            const isHypothesisAccepted = chiObs < chiCrit;

            const resultsDiv = document.getElementById('task1-results');
            resultsDiv.innerHTML = `
                <p><b>Объем выборки (n):</b> ${totalN}</p>
                <p><b>Выборочная средняя (x̄):</b> ${xBar.toFixed(4)}</p>
                <p><b>Выборочная дисперсия (Dв):</b> ${sampleVar.toFixed(4)}</p>
                <p><b>Несмещенная дисперсия (s²):</b> ${unbiasedVar.toFixed(4)}</p>
                <p><b>Исправленное СКО (s):</b> ${s.toFixed(4)}</p>
                <p><b>Мода (Mo):</b> ${Mo.toFixed(4)}</p>
                <p><b>Медиана (Me):</b> ${Me.toFixed(4)}</p>
                <p><b>Доверительный интервал (γ=0.95):</b> (${ciLow.toFixed(4)}; ${ciHigh.toFixed(4)})</p>
                <hr>
                <h3>Критерий согласия Пирсона (α = 0.05):</h3>
                <p><b>χ² наблюдаемое:</b> ${chiObs.toFixed(4)}</p>
                <p><b>Степени свободы (df):</b> ${df}</p>
                <p><b>χ² критическое:</b> ${chiCrit.toFixed(3)}</p>
                <p><b>Вывод:</b> ${isHypothesisAccepted 
                    ? '<span style="color: green;">Гипотеза о нормальном распределении ПРИНИМАЕТСЯ</span>' 
                    : '<span style="color: red;">Гипотеза о нормальном распределении ОТКЛОНЯЕТСЯ</span>'}</p>
            `;

            const labels = intervals.map(int => `(${int.start}, ${int.end}]`);
            const relFreqs = intervals.map(int => int.ni / (totalN * h));

            if (histogramChart) histogramChart.destroy();
            histogramChart = new Chart(document.getElementById('histogramChart'), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Плотность относительных частот',
                        data: relFreqs,
                        backgroundColor: 'rgba(54, 162, 235, 0.5)',
                        borderColor: 'rgba(54, 162, 235, 1)',
                        borderWidth: 1,
                        barPercentage: 1,
                        categoryPercentage: 1
                    }]
                },
                options: {
                    scales: {
                        y: { beginAtZero: true, title: { display: true, text: 'wi / h' } },
                        x: { title: { display: true, text: 'Интервалы' } }
                    }
                }
            });

            const edfX = [intervals[0].start - 2];
            const edfY = [0];
            let currentSum = 0;
            intervals.forEach(int => {
                edfX.push(int.start);
                edfY.push(currentSum / totalN);
                currentSum += int.ni;
                edfX.push(int.end);
                edfY.push(currentSum / totalN);
            });
            edfX.push(intervals[intervals.length - 1].end + 2);
            edfY.push(1);

            if (edfChart) edfChart.destroy();
            edfChart = new Chart(document.getElementById('edfChart'), {
                type: 'line',
                data: {
                    labels: edfX,
                    datasets: [{
                        label: 'Эмпирическая функция распределения F*(x)',
                        data: edfY,
                        borderColor: 'rgba(255, 99, 132, 1)',
                        stepped: true,
                        fill: false
                    }]
                },
                options: {
                    scales: {
                        y: { beginAtZero: true, max: 1.1 },
                        x: { type: 'linear', position: 'bottom' }
                    }
                }
            });
        }

        function updateTask2() {
            const xBar = parseFloat(document.getElementById('t2-xbar').value) || 0;
            const n = parseFloat(document.getElementById('t2-n').value) || 1;
            const sigma = parseFloat(document.getElementById('t2-sigma').value) || 0;

            const gammas = [0.9, 0.95, 0.99];
            const results = gammas.map(g => {
                const z = getZScore(g);
                const delta = z * sigma / Math.sqrt(n);
                return { gamma: g, delta, low: xBar - delta, high: xBar + delta };
            });

            const nNew = n * 4;
            const deltaNew = gammas.map(g => {
                const z = getZScore(g);
                return z * sigma / Math.sqrt(nNew);
            });

            const resultsDiv = document.getElementById('task2-results');
            let html = `<h3>1) Доверительные интервалы:</h3><ul>`;
            results.forEach(res => {
                html += `<li>γ = ${res.gamma}: (${res.low.toFixed(4)}; ${res.high.toFixed(4)}) [Радиус: ${res.delta.toFixed(4)}]</li>`;
            });
            html += `</ul><h3>2) При увеличении n в 4 раза:</h3><p>Новый объем выборки n' = ${nNew}</p><ul>`;
            results.forEach((res, i) => {
                const dNew = deltaNew[i];
                const ratio = res.delta / dNew;
                html += `<li>γ = ${res.gamma}: Радиус уменьшится в ${ratio.toFixed(1)} раза (с ${res.delta.toFixed(4)} до ${dNew.toFixed(4)})</li>`;
            });
            html += `</ul><p class="formula">Заметим, что радиус δ = z * σ / √n. При увеличении n в 4 раза, √n увеличивается в 2 раза, следовательно радиус уменьшается в 2 раза.</p>`;
            resultsDiv.innerHTML = html;

            if (ciChart) ciChart.destroy();
            ciChart = new Chart(document.getElementById('ciChart'), {
                type: 'bar',
                data: {
                    labels: gammas.map(g => `γ = ${g}`),
                    datasets: [{
                        label: 'Доверительный интервал',
                        data: results.map(res => [res.low, res.high]),
                        backgroundColor: 'rgba(75, 192, 192, 0.5)',
                        borderColor: 'rgba(75, 192, 192, 1)',
                        borderWidth: 1
                    }]
                },
                options: {
                    indexAxis: 'y',
                    scales: {
                        x: { title: { display: true, text: 'Значение x' } }
                    },
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return `Интервал: [${context.raw[0].toFixed(4)}, ${context.raw[1].toFixed(4)}]`;
                                }
                            }
                        }
                    }
                }
            });
        }

        document.querySelectorAll('.task1-ni').forEach(input => {
            input.addEventListener('input', updateTask1);
        });
        document.getElementById('t2-xbar').addEventListener('input', updateTask2);
        document.getElementById('t2-n').addEventListener('input', updateTask2);
        document.getElementById('t2-sigma').addEventListener('input', updateTask2);

        updateTask1();
        updateTask2();
    </script>
</body>
</html>
